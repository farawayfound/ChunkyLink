---
- name: Install system packages
  ansible.builtin.apt:
    name:
      - git
      - curl
      - gnupg2
      - tesseract-ocr
      - python3
      - python3-pip
      - python3-venv
      - libgl1
      - libglib2.0-0
    state: present
    update_cache: true

- name: Create vporag service user
  ansible.builtin.user:
    name: "{{ vporag_user }}"
    shell: /bin/bash
    create_home: true
    system: true

- name: Create /srv/vpo_rag owned by vporag
  ansible.builtin.file:
    path: "{{ srv_dir }}"
    state: directory
    owner: "{{ vporag_user }}"
    group: "{{ vporag_group }}"
    mode: "0755"
