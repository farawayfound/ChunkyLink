# Nanobot worker stack — runs on the Ryzen node.
# Connects to Redis on the M1 Mac over the LAN.
#
# Usage:
#   docker compose -f docker/docker-compose.nanobot.yml up -d --build
#
services:
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    env_file:
      - ../.env.nanobot
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Parallel slots multiply KV RAM; 1 keeps peak usage low on 32GB hosts (see Ollama docs / issues).
    environment:
      - OLLAMA_NUM_PARALLEL=1
    # Give the container a high explicit RAM budget so Ollama's cgroup "available"
    # accounts for reclaimable file-cache (~9-10 GiB from model files on disk).
    # 30g on a 32GB host leaves ~2 GiB for the OS kernel + other services.
    mem_limit: 30g
    restart: unless-stopped

volumes:
  ollama_data:
